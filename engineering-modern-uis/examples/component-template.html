<!--
  Component Template — diseño-UI/UX Skill
  Demonstrates server/client component separation with signals-based reactivity.
-->
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="2026 Frontend Architecture — Component Template" />
  <title>Component Template · diseño-UI/UX</title>

  <style>
    /* ================================================================
       Design Tokens — oklch Color System + Fluid Scales
       ================================================================ */
    :root {
      color-scheme: light dark;

      /* Primary palette */
      --color-primary:     oklch(65% 0.25 260);
      --color-primary-dim: oklch(55% 0.20 260);
      --color-accent:      oklch(75% 0.18 160);
      --color-danger:      oklch(60% 0.25 30);

      /* Neutrals */
      --color-surface:     oklch(98% 0.005 260);
      --color-surface-alt: oklch(95% 0.008 260);
      --color-border:      oklch(88% 0.01 260);
      --color-text:        oklch(20% 0.02 260);
      --color-text-muted:  oklch(45% 0.02 260);

      /* Fluid spacing */
      --space-2xs: clamp(0.125rem, 0.25vw, 0.25rem);
      --space-xs:  clamp(0.25rem,  0.5vw,  0.5rem);
      --space-sm:  clamp(0.5rem,   1vw,    0.75rem);
      --space-md:  clamp(0.75rem,  1.5vw,  1.25rem);
      --space-lg:  clamp(1.25rem,  2.5vw,  2rem);
      --space-xl:  clamp(2rem,     4vw,    3.5rem);
      --space-2xl: clamp(3rem,     6vw,    5rem);

      /* Fluid typography */
      --font-xs:   clamp(0.75rem,  0.3vw + 0.7rem,  0.8125rem);
      --font-sm:   clamp(0.8125rem, 0.4vw + 0.75rem, 0.9375rem);
      --font-base: clamp(1rem,     0.5vw + 0.875rem, 1.125rem);
      --font-lg:   clamp(1.25rem,  0.8vw + 1rem,    1.5rem);
      --font-xl:   clamp(1.5rem,   1.2vw + 1.125rem, 2rem);
      --font-2xl:  clamp(2rem,     2vw + 1.5rem,    3rem);

      /* Radii */
      --radius-sm: 0.375rem;
      --radius-md: 0.75rem;
      --radius-lg: 1.25rem;

      /* Shadows */
      --shadow-sm: 0 1px 2px oklch(0% 0 0 / 0.05);
      --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.08);
      --shadow-lg: 0 8px 32px oklch(0% 0 0 / 0.12);

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-normal: 250ms;
    }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-surface:     oklch(15% 0.01 260);
        --color-surface-alt: oklch(20% 0.012 260);
        --color-border:      oklch(30% 0.015 260);
        --color-text:        oklch(90% 0.01 260);
        --color-text-muted:  oklch(65% 0.01 260);
      }
    }

    /* ================================================================
       CSS Reset (Minimal)
       ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: var(--font-base);
      color: var(--color-text);
      background: var(--color-surface);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       Layout — Container Query Grid
       ================================================================ */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
      padding: var(--space-xl);
      max-width: 80rem;
      margin-inline: auto;
      container-type: inline-size;
      container-name: main-layout;
    }

    @container main-layout (min-width: 48rem) {
      .layout {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @container main-layout (min-width: 72rem) {
      .layout {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ================================================================
       Server Component: MetricCard
       Zero-JS, semantic HTML, container-query responsive.
       ================================================================ */
    .metric-card {
      container-type: inline-size;
      container-name: card;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--duration-normal) var(--ease-out),
                  translate var(--duration-normal) var(--ease-out);

      &:hover {
        box-shadow: var(--shadow-md);
        translate: 0 -2px;
      }

      & .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-block-end: var(--space-sm);
      }

      & .card-label {
        font-size: var(--font-sm);
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 500;
      }

      & .card-badge {
        font-size: var(--font-xs);
        padding: var(--space-2xs) var(--space-xs);
        border-radius: var(--radius-sm);
        font-weight: 600;

        &[data-trend="up"] {
          background: oklch(90% 0.12 150);
          color: oklch(35% 0.15 150);
        }
        &[data-trend="down"] {
          background: oklch(90% 0.12 25);
          color: oklch(40% 0.18 25);
        }
      }

      & .card-value {
        font-size: var(--font-2xl);
        font-weight: 700;
        line-height: 1.1;
        margin-block-end: var(--space-xs);
      }

      & .card-description {
        font-size: var(--font-sm);
        color: var(--color-text-muted);
      }
    }

    @container card (max-width: 20rem) {
      .card-value {
        font-size: var(--font-xl) !important;
      }
    }

    /* ================================================================
       Client Component: Interactive Button
       Hydrated component with signal-driven state.
       ================================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: var(--space-sm) var(--space-md);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-out),
                  scale var(--duration-fast) var(--ease-out);

      &:active {
        scale: 0.97;
      }

      &:focus-visible {
        outline: 3px solid var(--color-primary);
        outline-offset: 2px;
      }

      &.btn-primary {
        background: var(--color-primary);
        color: white;

        &:hover {
          background: var(--color-primary-dim);
        }
      }

      &.btn-ghost {
        background: transparent;
        color: var(--color-text);
        border: 1px solid var(--color-border);

        &:hover {
          background: var(--color-surface-alt);
        }
      }
    }

    /* ================================================================
       Animation — GPU Accelerated
       ================================================================ */
    @keyframes fade-in-up {
      from {
        opacity: 0;
        translate: 0 1rem;
      }
      to {
        opacity: 1;
        translate: 0 0;
      }
    }

    .animate-in {
      animation: fade-in-up var(--duration-normal) var(--ease-out) both;
    }

    .animate-in:nth-child(2) { animation-delay: 80ms; }
    .animate-in:nth-child(3) { animation-delay: 160ms; }
    .animate-in:nth-child(4) { animation-delay: 240ms; }

    /* Respect reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      .animate-in {
        animation: none;
      }
    }

    /* ================================================================
       Utility: Visually Hidden (Accessibility)
       ================================================================ */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>

  <header role="banner" style="padding: var(--space-xl); text-align: center;">
    <h1 style="font-size: var(--font-2xl); font-weight: 800;">
      Dashboard
    </h1>
    <p style="color: var(--color-text-muted); margin-top: var(--space-xs);">
      Real-time analytics overview
    </p>
  </header>

  <main role="main" class="layout" aria-label="Analytics metrics">

    <!-- SERVER COMPONENT: MetricCard (zero JS) -->
    <article class="metric-card animate-in" aria-label="Total revenue metric">
      <div class="card-header">
        <span class="card-label">Revenue</span>
        <span class="card-badge" data-trend="up">+12.5%</span>
      </div>
      <div class="card-value">$48,290</div>
      <p class="card-description">Compared to last month</p>
    </article>

    <!-- SERVER COMPONENT: MetricCard -->
    <article class="metric-card animate-in" aria-label="Active users metric">
      <div class="card-header">
        <span class="card-label">Active Users</span>
        <span class="card-badge" data-trend="up">+8.1%</span>
      </div>
      <div class="card-value">12,847</div>
      <p class="card-description">Currently online</p>
    </article>

    <!-- SERVER COMPONENT: MetricCard -->
    <article class="metric-card animate-in" aria-label="Bounce rate metric">
      <div class="card-header">
        <span class="card-label">Bounce Rate</span>
        <span class="card-badge" data-trend="down">-3.2%</span>
      </div>
      <div class="card-value">24.1%</div>
      <p class="card-description">7-day rolling average</p>
    </article>

    <!-- SERVER COMPONENT: MetricCard -->
    <article class="metric-card animate-in" aria-label="Conversion rate metric">
      <div class="card-header">
        <span class="card-label">Conversions</span>
        <span class="card-badge" data-trend="up">+5.7%</span>
      </div>
      <div class="card-value">3.8%</div>
      <p class="card-description">Goal completion rate</p>
    </article>

  </main>

  <!-- CLIENT COMPONENT: Interactive controls (hydrated) -->
  <section role="complementary" aria-label="Dashboard controls"
           style="text-align: center; padding: var(--space-xl);">
    <button class="btn btn-primary" id="refresh-btn" aria-label="Refresh data">
      ↻ Refresh
    </button>
    <button class="btn btn-ghost" id="export-btn" aria-label="Export report">
      ↓ Export
    </button>
  </section>

  <!-- ================================================================
       CLIENT-SIDE: Signals-Based Reactivity Demo
       Minimal hydration — only interactive elements get JS.
       ================================================================ -->
  <script type="module">
    // --- Signal Primitive ---
    function createSignal(initialValue) {
      let value = initialValue;
      const subscribers = new Set();

      function get() {
        if (currentEffect) subscribers.add(currentEffect);
        return value;
      }

      function set(newValue) {
        if (newValue === value) return;
        value = typeof newValue === 'function' ? newValue(value) : newValue;
        for (const fn of subscribers) fn();
      }

      return [get, set];
    }

    // --- Effect Primitive ---
    let currentEffect = null;

    function effect(fn) {
      currentEffect = fn;
      fn();
      currentEffect = null;
    }

    // --- Application State ---
    const [isLoading, setLoading] = createSignal(false);
    const [lastRefresh, setLastRefresh] = createSignal(Date.now());

    // --- Hydrate Interactive Components ---
    const refreshBtn = document.getElementById('refresh-btn');
    const exportBtn = document.getElementById('export-btn');

    effect(() => {
      if (isLoading()) {
        refreshBtn.textContent = '⟳ Loading...';
        refreshBtn.disabled = true;
      } else {
        refreshBtn.textContent = '↻ Refresh';
        refreshBtn.disabled = false;
      }
    });

    refreshBtn?.addEventListener('click', () => {
      setLoading(true);
      setTimeout(() => {
        setLastRefresh(Date.now());
        setLoading(false);
      }, 800);
    });

    exportBtn?.addEventListener('click', () => {
      const data = { exported: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard-export.json';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>

</body>
</html>
